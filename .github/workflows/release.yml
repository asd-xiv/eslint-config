name: Release
on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.hash }}
      node-version: ${{ steps.nvmrc.outputs.node_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read .nvmrc
        id: nvmrc
        run: echo "node_version=$(cat .nvmrc)" >> $GITHUB_OUTPUT

      - name: Generate cache key
        id: cache-key
        run: echo "hash=$(cat package-lock.json | shasum -a 256 | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.nvmrc.outputs.node_version }}
          cache: "npm"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ steps.cache-key.outputs.hash }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm clean-install

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ needs.setup.outputs.cache-key }}

      - name: Run linting
        run: npm run lint

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ needs.setup.outputs.cache-key }}

      - name: Run type checking
        run: npm run typecheck

  release:
    name: Release
    needs: [setup, lint, typecheck]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Auth for git commands later in the job (commit, tag, push)
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ needs.setup.outputs.cache-key }}

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures

      - name: Build project
        run: npm run build

      - name: Release
        env:
          # Auth for GitHub REST API (create release, comment on issues/PRs)
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          # Override @semantic-release/git's default "semantic-release-bot" author
          GIT_AUTHOR_NAME: Andrei Dumitrescu
          GIT_AUTHOR_EMAIL: 5057797+andreidmt@users.noreply.github.com
          GIT_COMMITTER_NAME: Andrei Dumitrescu
          GIT_COMMITTER_EMAIL: 5057797+andreidmt@users.noreply.github.com
        run: |
          npx semantic-release
